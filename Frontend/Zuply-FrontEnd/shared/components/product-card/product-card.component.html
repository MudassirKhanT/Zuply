<div class="card" (click)="cardClickEvt.emit(product)">
  <div class="card-img">
    <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.name" loading="lazy"/>
    <span *ngIf="!product.imageUrl" class="card-img-placeholder">🛒</span>
    <app-ai-badge *ngIf="product.aiGenerated"></app-ai-badge>
  </div>
  <div class="card-body">
    <span class="badge-primary card-cat">{{ product.categoryName || product.category }}</span>
    <div class="card-name">{{ product.name }}</div>
    <div class="card-seller" *ngIf="product.sellerName">🏪 {{ product.sellerName }}</div>
    <div class="card-footer">
      <div class="price">₹ {{ product.price | number:'1.0-0' }}</div>
      <button
        class="btn-primary btn-sm btn-pill"
        [disabled]="adding"
        (click)="$event.stopPropagation(); addToCartEvent.emit(product)">
        <span *ngIf="!adding">Add</span>
        <span *ngIf="adding" class="card-spinner"></span>
      </button>
    </div>
  </div>
</div>
