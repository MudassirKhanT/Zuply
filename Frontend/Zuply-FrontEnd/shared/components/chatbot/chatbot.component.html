<!-- ════════════════════════════════════════════════════
     ZUPLY AI CHATBOT
════════════════════════════════════════════════════ -->

<!-- Floating Action Button -->
<div class="chat-fab-wrap">

  <!-- Chat panel -->
  <div class="chat-panel" [class.panel-open]="isOpen" role="dialog" aria-label="Zuply AI Chat">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="bot-avatar">
          <svg width="20" height="20" viewBox="0 0 46 46" fill="none">
            <rect x="3" y="13" width="40" height="30" rx="6" fill="#C9A84C"/>
            <path d="M15 23L21.5 23L15 32L31 32" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="bot-info">
          <div class="bot-name">Zuply AI</div>
          <div class="bot-status">
            <span class="status-dot"></span>
            Always online
          </div>
        </div>
      </div>
      <div class="chat-header-actions">
        <button class="header-btn" (click)="clearChat()" title="Clear chat" aria-label="Clear chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
        </button>
        <button class="header-btn close-btn" (click)="closeChat()" title="Close" aria-label="Close chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" #msgList>

      <ng-container *ngFor="let msg of messages; let i = index">

        <!-- Bot message -->
        <div class="msg-row bot-row" *ngIf="msg.role === 'bot'" [class.msg-enter]="true">
          <div class="msg-avatar-sm">Z</div>
          <div class="msg-bubble bot-bubble">

            <!-- Typing indicator -->
            <div class="typing-dots" *ngIf="msg.typing">
              <span></span><span></span><span></span>
            </div>

            <!-- Actual message -->
            <div *ngIf="!msg.typing" [innerHTML]="formatText(msg.text)" class="msg-text"></div>

            <span class="msg-time" *ngIf="!msg.typing">{{ msg.time }}</span>
          </div>
        </div>

        <!-- User message -->
        <div class="msg-row user-row" *ngIf="msg.role === 'user'" [class.msg-enter]="true">
          <div class="msg-bubble user-bubble">
            <div class="msg-text">{{ msg.text }}</div>
            <span class="msg-time">{{ msg.time }}</span>
          </div>
        </div>

      </ng-container>

      <!-- Quick chips -->
      <div class="chips-wrap" *ngIf="showChips && !isTyping">
        <div class="chips-label">Quick questions</div>
        <div class="chips-row">
          <button
            class="chip"
            *ngFor="let chip of chips"
            (click)="sendChip(chip)">
            {{ chip }}
          </button>
        </div>
      </div>

    </div>

    <!-- Input bar -->
    <div class="chat-input-bar">
      <textarea
        #textInput
        class="chat-input"
        rows="1"
        placeholder="Ask me anything about Zuply…"
        [(ngModel)]="userInput"
        (keydown)="onKeydown($event)"
        [disabled]="isTyping"
        maxlength="500">
      </textarea>
      <button
        class="send-btn"
        (click)="send()"
        [disabled]="!userInput.trim() || isTyping"
        aria-label="Send message">
        <svg *ngIf="!isTyping" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <div class="send-spinner" *ngIf="isTyping"></div>
      </button>
    </div>

    <div class="chat-footer-note">Powered by Gemini AI · Responses may vary</div>

  </div>

  <!-- FAB button -->
  <button
    class="chat-fab"
    [class.fab-open]="isOpen"
    (click)="toggleChat()"
    aria-label="Toggle chat">

    <!-- Pulse rings (show when closed) -->
    <span class="fab-ring ring-1" *ngIf="!isOpen"></span>
    <span class="fab-ring ring-2" *ngIf="!isOpen"></span>

    <!-- Unread badge -->
    <span class="fab-badge" *ngIf="!isOpen && unreadCount > 0">{{ unreadCount }}</span>

    <!-- Chat icon (closed state) -->
    <svg class="fab-icon-chat" *ngIf="!isOpen" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      <circle cx="9" cy="10" r=".8" fill="currentColor"/>
      <circle cx="12" cy="10" r=".8" fill="currentColor"/>
      <circle cx="15" cy="10" r=".8" fill="currentColor"/>
    </svg>

    <!-- Close icon (open state) -->
    <svg class="fab-icon-close" *ngIf="isOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

  </button>

</div>
