<!-- Toast notification -->
<div class="toast" *ngIf="toast" [class.toast-success]="toast.type === 'success'" [class.toast-error]="toast.type === 'error'">
  {{ toast.msg }}
</div>

<div class="page-container">
  <app-loading-spinner [show]="loading"></app-loading-spinner>

  <div *ngIf="!loading && product" class="detail-wrap">
    <button class="back-btn" routerLink="/products">← Back</button>

    <div class="detail-grid">
      <!-- Image -->
      <div class="detail-image">
        <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.name"/>
        <div *ngIf="!product.imageUrl" class="detail-img-placeholder">
          <span style="font-size:80px">🛒</span>
        </div>
        <app-ai-badge *ngIf="product.aiGenerated"></app-ai-badge>
      </div>

      <!-- Info -->
      <div class="detail-info">
        <div class="detail-cat badge-primary">{{ product.categoryName || product.category }}</div>
        <h1 class="detail-name">{{ product.name }}</h1>
        <div class="detail-seller" *ngIf="product.sellerName">🏪 {{ product.sellerName }}</div>
        <div class="detail-dist badge-distance" *ngIf="product.distance">📍 {{ product.distance }}</div>
        <div class="detail-price">₹ {{ product.price | number:'1.0-0' }}</div>

        <div class="detail-desc" *ngIf="product.description">
          <div class="desc-title">Description</div>
          <p>{{ product.description }}</p>
        </div>

        <!-- Login prompt -->
        <div class="login-prompt" *ngIf="!auth.isAuthenticated()">
          <span>Please <a routerLink="/login" [queryParams]="{ returnUrl: '/products/' + product.id }">log in</a> to add items to cart or wishlist.</span>
        </div>

        <div class="qty-row" *ngIf="auth.isAuthenticated()">
          <div class="qty-selector">
            <button class="qty-btn" (click)="decrement()">−</button>
            <span class="qty-value">{{ quantity }}</span>
            <button class="qty-btn" (click)="increment()">+</button>
          </div>
        </div>

        <div class="detail-btns">
          <button class="btn-secondary btn-pill" (click)="addToWishlist()" [disabled]="addingWishlist">
            <span *ngIf="!addingWishlist">❤️ Wishlist</span>
            <span *ngIf="addingWishlist" class="spinner-sm"></span>
          </button>
          <button class="btn-primary btn-pill" (click)="addToCart()" [disabled]="addingCart">
            <span *ngIf="!addingCart">🛒 Add to Cart</span>
            <span *ngIf="addingCart" class="spinner-sm"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!loading && !product">
    <div class="empty-icon">😕</div>
    <div class="empty-title">Product not found</div>
    <button class="btn-primary btn-pill" routerLink="/products">Browse Products</button>
  </div>
</div>
