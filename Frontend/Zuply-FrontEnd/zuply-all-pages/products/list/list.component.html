<!-- Toast -->
<div class="list-toast" *ngIf="toast" [class.toast-success]="toast.type==='success'" [class.toast-error]="toast.type==='error'">
  {{ toast.msg }}
</div>

<div class="page-container">

  <!-- Header -->
  <div class="list-header">
    <h1>{{ selectedCategory || 'All Products' }}</h1>
    <div class="sort-wrap">
      <label class="sort-label">Sort by:</label>
      <select class="select sort-select" [(ngModel)]="sortBy" (change)="onSortChange()">
        <option *ngFor="let opt of sortOptions" [value]="opt.value">{{ opt.label }}</option>
      </select>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-label">Browse by category</div>
    <div class="chips-row">
      <app-category-chip
        *ngFor="let cat of categories"
        [name]="cat.name"
        [active]="selectedCategory === cat.name"
        (chipClick)="onCategorySelect($event)">
      </app-category-chip>
    </div>
  </div>

  <!-- Results count -->
  <div class="results-count" *ngIf="!loading">
    <span class="count-badge">{{ products.length }}</span>
    product{{ products.length !== 1 ? 's' : '' }} found
    <span *ngIf="selectedCategory"> in <strong>{{ selectedCategory }}</strong></span>
  </div>

  <app-loading-spinner [show]="loading" message="Loading products..."></app-loading-spinner>

  <div class="grid-4" *ngIf="!loading && products.length > 0">
    <app-product-card
      *ngFor="let p of products"
      [product]="p"
      [adding]="addingId === p.id"
      (addToCartEvent)="addToCart($event)"
      (cardClickEvt)="goToDetail($event)">
    </app-product-card>
  </div>

  <div class="empty-state" *ngIf="!loading && products.length === 0">
    <div class="empty-icon">📦</div>
    <div class="empty-title">No products found</div>
    <div class="empty-desc">Try a different category or search term.</div>
    <button class="btn-primary btn-pill" (click)="selectedCategory = ''; loadProducts()">Clear filters</button>
  </div>

</div>
