<!-- src/app/pages/auth/register/register.component.html -->
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <svg width="48" height="48" viewBox="0 0 46 46" fill="none">
        <rect x="3" y="13" width="40" height="30" rx="6" fill="#0D5C63"/>
        <path d="M14 13C14 7 32 7 32 13" stroke="#0D5C63" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M15 23L21.5 23L15 32L31 32" stroke="#C9A84C" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="auth-brand">zu<em>ply</em></div>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join thousands of local shoppers and sellers</p>

    <div class="role-selector">
      <button *ngFor="let r of roles" class="role-btn" [class.active]="role === r" (click)="role = r">
        {{ r | titlecase }}
      </button>
    </div>

    <div class="error-banner" *ngIf="errorMsg">⚠️ {{ errorMsg }}</div>

    <div class="input-group">
      <label>Full Name *</label>
      <input class="input" type="text" placeholder="Enter your full name" [(ngModel)]="name"/>
    </div>

    <div class="input-group">
      <label>Email Address *</label>
      <input class="input" type="email" placeholder="Enter your email" [(ngModel)]="email"/>
    </div>

    <div class="input-group">
      <label>Phone Number *</label>
      <input class="input" type="tel" placeholder="Enter your phone number" [(ngModel)]="phone"/>
    </div>

    <div class="input-group" *ngIf="role === 'SELLER'">
      <label>Store Name</label>
      <input class="input" type="text" placeholder="Enter your store name" [(ngModel)]="storeName"/>
    </div>

    <div class="input-group">
      <label>Password *</label>
      <div class="password-wrap">
        <input class="input" [type]="showPassword ? 'text' : 'password'"
               placeholder="Create a password" [(ngModel)]="password"/>
        <span class="password-toggle" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁️' }}
        </span>
      </div>
    </div>

    <button class="btn-primary btn-full btn-pill register-btn"
            (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Create Account' }}
    </button>

    <div class="auth-footer">
      Already have an account?
      <a routerLink="/login" class="auth-link">Login</a>
    </div>
  </div>
</div>
