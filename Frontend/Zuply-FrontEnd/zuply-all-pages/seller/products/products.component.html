<!-- src/app/pages/seller/products/products.component.html -->
<div class="page-container">
  <div class="page-top">
    <h1 class="text-2xl">My Products</h1>
    <a routerLink="/seller/upload" class="btn-accent btn-pill">+ Upload New</a>
  </div>
  <app-loading-spinner [show]="loading"></app-loading-spinner>

  <div class="grid-4" *ngIf="!loading && products.length > 0">
    <div class="prod-card" *ngFor="let p of products">
      <div class="prod-img">
        <img *ngIf="p.imageUrl" [src]="p.imageUrl" [alt]="p.title" (error)="p.imageUrl=null"/>
        <span *ngIf="!p.imageUrl" style="font-size:36px">🛒</span>
      </div>
      <div class="prod-body">
        <span [class]="getStatusClass(p.status)">{{ p.status | titlecase }}</span>
        <div class="prod-name">{{ p.title || 'Untitled Product' }}</div>
        <div class="prod-category" *ngIf="p.category">{{ p.category }}</div>
        <div class="prod-price">{{ formatPrice(p) }}</div>
        <div class="prod-tags" *ngIf="p.tags?.length">
          <span *ngFor="let tag of p.tags?.slice(0,3)" class="tag-chip">{{ tag }}</span>
        </div>
        <button class="btn-primary btn-sm btn-pill" style="margin-top:8px" (click)="editProduct(p.id)">
          Edit
        </button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!loading && products.length === 0">
    <div class="empty-icon">📦</div>
    <div class="empty-title">No products yet</div>
    <div class="empty-desc">Upload your first product using AI-powered listing.</div>
    <a routerLink="/seller/upload" class="btn-primary btn-pill">Upload Now</a>
  </div>
</div>
