# Server
server.port=9090

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zuply_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Suvetha@2004}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (used if you move secret to application.properties instead of hardcoding)
app.jwt.secret=${JWT_SECRET:zuply-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=604800000

# Disable default Spring Security form login
spring.security.user.name=disable
spring.security.user.password=disable

# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.path=C:/zuply/uploads

# Gemini Vision API
gemini.api.key=${GEMINI_API_KEY:your-gemini-api-key}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}